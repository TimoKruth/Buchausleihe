<div class="row">
  <div class="col-xs-10 col-xs-offset-1" >
    @for (message of messages; track message) {
      <div class="panel panel-default" [routerLink]="['/chats', message.key]">
        <div class="panel-heading">
          <h3 class="panel-title">{{ message.name }}</h3>
        </div>
        <div class="panel-body">
          <div class="row">
            <div class="col-xs-1">
              <img [src]="getImageUrl(message)" [alt]="message.name || 'Chat avatar'">
            </div>
            <div class="col-xs-11">
              {{ message.text }}
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
